<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Studio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">✦ Photo Studio</h1>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-mode="outfit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.38 3.46L16 2 12 5.5 8 2 3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>
          Замена одежды
        </button>
        <button class="nav-btn" data-mode="background">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          Замена фона
        </button>
        <button class="nav-btn" data-mode="facefix">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
          Коррекция лица
        </button>
      </nav>
      <div class="sidebar-gallery">
        <h3>Последние результаты</h3>
        <div id="gallery" class="gallery-grid"></div>
      </div>
      <div class="sidebar-footer">
        <div class="comfyui-status" id="comfyStatus">
          <span class="status-dot offline"></span>
          ComfyUI
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="main-scroll" id="mainScroll">
        <div class="content">
          <!-- Welcome Message -->
          <div class="welcome" id="welcome">
            <h2>Photo Studio</h2>
            <p>Выберите режим слева, загрузите изображения и введите промпт для генерации</p>
            <div class="quick-actions">
              <button class="quick-btn" onclick="setMode('outfit')">
                <span class="quick-icon">👗</span>
                <span>Замена одежды</span>
              </button>
              <button class="quick-btn" onclick="setMode('background')">
                <span class="quick-icon">🏞️</span>
                <span>Замена фона</span>
              </button>
              <button class="quick-btn" onclick="setMode('facefix')">
                <span class="quick-icon">👤</span>
                <span>Коррекция лица</span>
              </button>
            </div>
          </div>

          <!-- Results Feed -->
          <div id="resultsFeed"></div>
        </div>
      </div>

      <!-- Input Area (always at bottom) -->
      <div class="input-area">
        <div class="input-container">
          <!-- Image Slots -->
          <div class="image-slots">
            <div class="image-slot" id="slot1" onclick="openPicker(1)">
              <div class="slot-placeholder" id="slot1placeholder">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                <span id="slot1label">Персона</span>
              </div>
              <img id="slot1img" class="slot-preview" style="display:none">
              <button class="slot-remove" id="slot1remove" style="display:none" onclick="event.stopPropagation(); clearSlot(1)">✕</button>
            </div>
            <div class="image-slot" id="slot2" onclick="openPicker(2)">
              <div class="slot-placeholder" id="slot2placeholder">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                <span id="slot2label">Одежда</span>
              </div>
              <img id="slot2img" class="slot-preview" style="display:none">
              <button class="slot-remove" id="slot2remove" style="display:none" onclick="event.stopPropagation(); clearSlot(2)">✕</button>
            </div>
          </div>

          <!-- Prompt Input -->
          <div class="prompt-row">
            <textarea id="promptInput" class="prompt-input" placeholder="Опишите, что нужно сделать…" rows="3"></textarea>
            <button class="send-btn" id="sendBtn" onclick="generate()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>

          <!-- Advanced toggle -->
          <div class="advanced-toggle">
            <button class="toggle-btn" onclick="toggleAdvanced()">
              <span id="advToggleIcon">▸</span> Дополнительно
            </button>
            <div class="advanced-panel" id="advancedPanel" style="display:none">
              <div class="adv-field">
                <label>Negative prompt</label>
                <input type="text" id="negativeInput" value="blurry, distorted, artifacts" placeholder="Negative prompt">
              </div>
              <div class="adv-row">
                <div class="adv-field">
                  <label>Качество</label>
                  <select id="qualitySelect">
                    <option value="fast" selected>Быстро (Lightning 4 шага)</option>
                    <option value="balanced">Баланс (Lightning 8 шагов)</option>
                    <option value="hq">Высокое (20 шагов, без Lightning)</option>
                  </select>
                </div>
                <div class="adv-field">
                  <label>Разрешение</label>
                  <select id="megapixelsSelect">
                    <option value="1.0">1.0 MP (быстро)</option>
                    <option value="1.5" selected>1.5 MP (стандарт)</option>
                    <option value="2.0">2.0 MP (высокое)</option>
                  </select>
                </div>
              </div>
              <div class="adv-row">
                <div class="adv-field">
                  <label>Seed</label>
                  <input type="text" id="seedInput" placeholder="Random">
                </div>
                <div class="adv-field">
                  <label>Prefix</label>
                  <input type="text" id="prefixInput" value="web_ui" placeholder="web_ui">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Image Picker Modal -->
  <div class="modal-overlay" id="pickerModal" style="display:none" onclick="closePicker()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>Выберите изображение</h3>
        <button class="modal-close" onclick="closePicker()">✕</button>
      </div>
      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="library" onclick="switchTab('library')">Библиотека</button>
        <button class="tab-btn" data-tab="outputs" onclick="switchTab('outputs')">Результаты</button>
        <button class="tab-btn" data-tab="upload" onclick="switchTab('upload')">Загрузить</button>
      </div>
      <div class="modal-body">
        <div id="tabLibrary" class="tab-content active">
          <div class="image-grid" id="libraryGrid"></div>
        </div>
        <div id="tabOutputs" class="tab-content" style="display:none">
          <div class="image-grid" id="outputsGrid"></div>
        </div>
        <div id="tabUpload" class="tab-content" style="display:none">
          <div class="upload-zone" id="uploadZone">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Перетащите файл или нажмите для загрузки</p>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" style="display:none" onclick="closeLightbox()">
    <img id="lightboxImg" onclick="event.stopPropagation()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
